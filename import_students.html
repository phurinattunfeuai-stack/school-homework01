function importAll() {
  const raw = localStorage.getItem('hw_tracker_v2');
  const state = raw ? JSON.parse(raw) : {rooms:[],students:{},assignments:[],submissions:{}};
  
  let added = 0;
  Object.entries(DATA).forEach(([room, names]) => {
    if (!state.rooms.includes(room)) state.rooms.push(room);
    if (!state.students[room]) state.students[room] = [];
    const existing = new Set(state.students[room].map(s => s.name));
    names.forEach(name => {
      if (!existing.has(name)) {
        state.students[room].push({id:'s'+Date.now()+Math.random().toString(36).slice(2,6), name});
        added++;
      }
    });
  });
  
  localStorage.setItem('hw_tracker_v2', JSON.stringify(state));
  
  const btn = document.querySelector('.btn-primary');
  btn.textContent = '✅ นำเข้าสำเร็จแล้ว!';
  btn.style.background = '#1d9e75';
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').textContent = `✅ นำเข้าสำเร็จ! เพิ่มนักเรียน ${added} คน ใน 5 ห้องเรียนแล้ว — รีเฟรชระบบเช็คงานเพื่อดูข้อมูล`;
}
