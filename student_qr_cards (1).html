<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;

  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --r:8px;--rlg:12px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1e1e1e;--bg2:#272727;--bg3:#2f2f2f;--text:#f0f0f0;--text2:#aaa;--text3:#777;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2)}
}
body{font-family:'Sarabun',sans-serif;background:var(--bg3);color:var(--text);padding:12px}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:600;flex:1;min-width:120px}
input[type=text],select{padding:7px 11px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);outline:none}
.sw{flex:1;min-width:130px}
.sw input{width:100%}
button{padding:7px 13px;border-radius:var(--r);border:0.5px solid var(--border2);cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;background:var(--bg);color:var(--text)}
.bp{background:#534ab7;color:#fff;border-color:#534ab7}
.badge{background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:3px 11px;font-size:12px;color:var(--text2);white-space:nowrap}
.progress{font-size:12px;color:var(--text3);padding:4px 0 8px;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rlg);padding:11px;display:flex;flex-direction:column;align-items:center;gap:6px}
.rm{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px}
.nm{font-size:12px;font-weight:500;text-align:center;color:var(--text);line-height:1.4}
.sub{font-size:11px;color:var(--text3)}
.qw{width:114px;height:114px;background:#fff;border-radius:5px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.qw canvas{width:114px!important;height:114px!important;display:block}
.empty{text-align:center;padding:32px;color:var(--text3);font-size:13px}
@media print{
  body{background:#fff;padding:4px}
  .topbar,.np{display:none!important}
  .grid{grid-template-columns:repeat(4,1fr);gap:6px}
  .card{border:1px solid #ccc;break-inside:avoid;page-break-inside:avoid}
}
</style>

</div>
<div class="progress" id="prog"></div>
<div id="grid" class="grid"></div>

async function render() {
  const room = document.getElementById('rm').value;
  const q = document.getElementById('q').value.trim();
  const grid = document.getElementById('grid');
  const prog = document.getElementById('prog');

  const list = ALL.filter(s =>
    (!room || s.r === room) && (!q || s.n.includes(q))
  );

  document.getElementById('cnt').textContent = list.length + ' คน';

  if (!list.length) {
    grid.innerHTML = '<div class="empty">ไม่พบนักเรียน</div>';
    prog.textContent = '';
    return;
  }

  grid.innerHTML = list.map(s => {
    const c = RC[s.r] || {bg:'#f0f0f0',tc:'#333'};
    const short = s.n.replace(/^(เด็กหญิง|เด็กชาย|นาย|นางสาว|นาง)/,'');
    return `<div class="card">
      <span class="rm" style="background:${c.bg};color:${c.tc}">ป.${s.r==='ม.1'?'':s.r.replace('.','')}${s.r==='ม.1'?'ม.1':''} · ${s.i}</span>
      <div class="qw" id="qw-${s.r}-${s.i}"></div>
      <div class="nm">${short}</div>
      <div class="sub">สแกนส่งงาน</div>
    </div>`;
  }).join('');

  let done = 0;
  for (const s of list) {
    const wrap = document.getElementById('qw-' + s.r + '-' + s.i);
    if (!wrap) continue;
    try {
      const canvas = document.createElement('canvas');
      wrap.innerHTML = '';
      wrap.appendChild(canvas);
      await QRCode.toCanvas(canvas,
        JSON.stringify({studentIdx: s.i-1, name: s.n, room: s.r, class: 'M1-Math'}),
        {width:114, margin:1, color:{dark:'#000',light:'#fff'}, errorCorrectionLevel:'M'}
      );
    } catch(e) {
      wrap.innerHTML = '<span style="font-size:10px;color:#999">error</span>';
    }
    done++;
    if (done % 10 === 0 || done === list.length) {
      prog.textContent = done < list.length ? `กำลังสร้าง QR... ${done}/${list.length}` : '';
    }
    await new Promise(r => setTimeout(r, 0));
  }
}

render();
</script>
