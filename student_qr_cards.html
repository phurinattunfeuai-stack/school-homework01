
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--color-background-tertiary);color:var(--color-text-primary);padding:16px}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.top-bar h1{font-size:18px;font-weight:500;flex:1}
select,input{padding:7px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;font-family:inherit;background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
button{padding:8px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);cursor:pointer;font-size:14px;font-family:inherit;font-weight:500;background:var(--color-background-primary);color:var(--color-text-primary);transition:all .15s}
button:hover{background:var(--color-background-secondary)}
.btn-print{background:#534ab7;color:#fff;border-color:#534ab7}
.btn-print:hover{background:#3c348a;border-color:#3c348a}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px}
.card-room{font-size:11px;font-weight:500;padding:2px 10px;border-radius:20px;background:#eeedfe;color:#3c3489}
.card-name{font-size:13px;font-weight:500;text-align:center;color:var(--color-text-primary);line-height:1.4}
.card-sub{font-size:11px;color:var(--color-text-secondary)}
.qr-wrap{width:120px;height:120px;display:flex;align-items:center;justify-content:center}
.empty{text-align:center;padding:40px;color:var(--color-text-tertiary);font-size:14px}
.search-wrap{position:relative;flex:1;min-width:140px}
.search-wrap input{width:100%}
.count-badge{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:4px 12px;font-size:13px;color:var(--color-text-secondary);white-space:nowrap}
@media print{
  body{background:#fff;padding:8px}
  .top-bar,.no-print{display:none!important}
  .grid{grid-template-columns:repeat(4,1fr);gap:8px}
  .card{border:1px solid #ddd;break-inside:avoid;page-break-inside:avoid}
}
</style>

<h2 class="sr-only">QR Code ประจำตัวนักเรียน สำหรับสแกนรายงานการส่งงาน</h2>

<div class="top-bar no-print">
  <h1>QR Code นักเรียน</h1>
  <div class="search-wrap"><input type="text" id="search" placeholder="ค้นหาชื่อ..." oninput="renderCards()"></div>
  <select id="sel-room" onchange="renderCards()">
    <option value="">ทุกห้อง</option>
  </select>
  <span class="count-badge" id="count-badge">0 คน</span>
  <button class="btn-print" onclick="window.print()"><i class="ti ti-printer" aria-hidden="true"></i> พิมพ์</button>
</div>

<div id="grid" class="grid"></div>

const ROOM_COLORS = {'ป.4/1':'#eeedfe|#3c3489','ป.4/2':'#e1f5ee|#085041','ป.5/1':'#faeeda|#633806','ป.5/2':'#faece7|#712b13','ม.1':'#e6f1fb|#0c447c'};

function getStudents() {
  try {
    const raw = localStorage.getItem('hw_tracker_v2');
    if (raw) {
      const s = JSON.parse(raw);
      const out = {};
      (s.rooms||[]).forEach(r => { out[r] = (s.students[r]||[]).map(st => ({id:st.id,name:st.name,room:r})); });
      return out;
    }
  } catch(e){}
  const out = {};
  Object.entries(FALLBACK).forEach(([r,names]) => { out[r] = names.map((n,i) => ({id:'f'+r+i,name:n,room:r})); });
  return out;
}

let allStudents = [];
let qrGenerated = new Set();

function init() {
  const data = getStudents();
  const sel = document.getElementById('sel-room');
  Object.keys(data).forEach(r => {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = r;
    sel.appendChild(opt);
  });
  allStudents = [];
  Object.entries(data).forEach(([r, arr]) => arr.forEach(s => allStudents.push(s)));
  renderCards();
}

function renderCards() {
  const room = document.getElementById('sel-room').value;
  const q = document.getElementById('search').value.trim().toLowerCase();
  const grid = document.getElementById('grid');

  let filtered = allStudents.filter(s => {
    if (room && s.room !== room) return false;
    if (q && !s.name.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('count-badge').textContent = filtered.length + ' คน';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">ไม่พบนักเรียน</div>';
    return;
  }

  grid.innerHTML = filtered.map((s,i) => {
    const [bg,tc] = (ROOM_COLORS[s.room]||'#f1efe8|#444441').split('|');
    const shortName = s.name.replace(/^(เด็กหญิง|เด็กชาย|นาย|นางสาว|นาง)/,'');
    return `<div class="card">
      <span class="card-room" style="background:${bg};color:${tc}">${s.room}</span>
      <div class="qr-wrap" id="qr-${s.id}-${i}"></div>
      <div class="card-name">${shortName}</div>
      <div class="card-sub">สแกนเพื่อส่งงาน</div>
    </div>`;
  }).join('');

  setTimeout(() => {
    filtered.forEach((s,i) => {
      const wrap = document.getElementById('qr-'+s.id+'-'+i);
      if (!wrap || qrGenerated.has(s.id+'-'+i)) return;
      qrGenerated.add(s.id+'-'+i);
      const payload = JSON.stringify({studentId: s.id, name: s.name, room: s.room, action: 'submit'});
      try {
        new QRCode(wrap, {
          text: payload,
          width: 110, height: 110,
          colorDark: '#1a1a18',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M
        });
      } catch(e) {
        wrap.innerHTML = '<div style="width:110px;height:110px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--color-text-tertiary);text-align:center">QR<br>'+s.id+'</div>';
      }
    });
  }, 50);
}

init();
</script>
