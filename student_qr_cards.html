<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code นักเรียน</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1e1e1e;--bg2:#272727;--bg3:#2f2f2f;--text:#f0f0f0;--text2:#aaa;--text3:#777;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2)}
}
body{font-family:'Sarabun',sans-serif;background:var(--bg3);color:var(--text);padding:14px}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.top-bar h1{font-size:17px;font-weight:600;flex:1;min-width:120px}
select,input[type=text]{padding:7px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none}
.search-wrap{position:relative;flex:1;min-width:140px}
.search-wrap input{width:100%}
button{padding:8px 14px;border-radius:var(--radius);border:0.5px solid var(--border2);cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;background:var(--bg);color:var(--text)}
.btn-print{background:#534ab7;color:#fff;border-color:#534ab7}
.count-badge{background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px;color:var(--text2);white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px;display:flex;flex-direction:column;align-items:center;gap:7px}
.card-room{font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px}
.card-name{font-size:13px;font-weight:500;text-align:center;color:var(--text);line-height:1.4}
.card-sub{font-size:11px;color:var(--text3)}
.qr-wrap{width:118px;height:118px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:6px;overflow:hidden}
.qr-wrap canvas,.qr-wrap img{width:118px!important;height:118px!important}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:14px}
.loading{font-size:12px;color:var(--text3);text-align:center;padding:6px 0}
@media print{
  body{background:#fff;padding:6px}
  .top-bar,.no-print{display:none!important}
  .grid{grid-template-columns:repeat(4,1fr);gap:6px}
  .card{border:1px solid #ccc;break-inside:avoid;page-break-inside:avoid}
  .qr-wrap{background:#fff}
}
</style>
</head>
<body>
<h2 class="sr-only">QR Code ประจำตัวนักเรียน สำหรับสแกนรายงานการส่งงาน</h2>

<div class="top-bar no-print">
  <h1><i class="ti ti-qrcode"></i> QR Code นักเรียน</h1>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="🔍 ค้นหาชื่อ..." oninput="renderCards()">
  </div>
  <select id="sel-room" onchange="renderCards()">
    <option value="">ทุกห้อง</option>
  </select>
  <span class="count-badge" id="count-badge">0 คน</span>
  <button class="btn-print no-print" onclick="window.print()"><i class="ti ti-printer"></i> พิมพ์</button>
</div>

<div id="grid" class="grid"></div>

<!-- ใช้ QRCode.js ที่ยังใช้งานได้จริง (jsDelivr CDN) -->

const ROOM_COLORS = {
  'ม.1':   {bg:'#e6f1fb', tc:'#0c447c'},
  'ป.4/1': {bg:'#eeedfe', tc:'#3c3489'},
  'ป.4/2': {bg:'#e1f5ee', tc:'#085041'},
  'ป.5/1': {bg:'#faeeda', tc:'#633806'},
  'ป.5/2': {bg:'#faece7', tc:'#712b13'},
};

let allStudents = [];

function init() {
  // สร้างรายชื่อนักเรียนทั้งหมด
  const sel = document.getElementById('sel-room');
  Object.keys(FALLBACK).forEach(room => {
    const opt = document.createElement('option');
    opt.value = room; opt.textContent = room;
    sel.appendChild(opt);
    FALLBACK[room].forEach((name, i) => {
      allStudents.push({ id: room + '_' + i, name, room, idx: i + 1 });
    });
  });
  renderCards();
}

async function renderCards() {
  const room = document.getElementById('sel-room').value;
  const q    = document.getElementById('search').value.trim();
  const grid = document.getElementById('grid');

  const filtered = allStudents.filter(s => {
    if (room && s.room !== room) return false;
    if (q && !s.name.includes(q)) return false;
    return true;
  });

  document.getElementById('count-badge').textContent = filtered.length + ' คน';

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">ไม่พบนักเรียน</div>';
    return;
  }

  // สร้าง card ก่อน (ไม่มี QR ยัง)
  grid.innerHTML = filtered.map(s => {
    const c = ROOM_COLORS[s.room] || {bg:'#f0f0f0', tc:'#333'};
    const shortName = s.name.replace(/^(เด็กหญิง|เด็กชาย|นาย|นางสาว|นาง)/,'');
    return `<div class="card">
      <span class="card-room" style="background:${c.bg};color:${c.tc}">${s.room} · เลขที่ ${s.idx}</span>
      <div class="qr-wrap" id="qr-${s.id}">
        <div class="loading">กำลังโหลด...</div>
      </div>
      <div class="card-name">${shortName}</div>
      <div class="card-sub">สแกนเพื่อส่งงาน</div>
    </div>`;
  }).join('');

  // สร้าง QR ทีละตัวแบบ async ไม่บล็อก UI
  for (const s of filtered) {
    const wrap = document.getElementById('qr-' + s.id);
    if (!wrap) continue;
    const payload = JSON.stringify({
      studentIdx: s.idx - 1,
      name: s.name,
      room: s.room,
      class: 'M1-Math'
    });
    try {
      const canvas = document.createElement('canvas');
      wrap.innerHTML = '';
      wrap.appendChild(canvas);
      await QRCode.toCanvas(canvas, payload, {
        width: 118,
        margin: 1,
        color: { dark: '#000000', light: '#ffffff' },
        errorCorrectionLevel: 'M'
      });
    } catch(e) {
      wrap.innerHTML = '<div style="font-size:10px;color:#999;text-align:center;padding:4px">QR error</div>';
      console.error('QR error for', s.name, e);
    }
    // yield to browser เพื่อให้ render ได้
    await new Promise(r => setTimeout(r, 0));
  }
}

init();
</script>
</body>
</html>
